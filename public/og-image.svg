<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Beautiful dark premium space background -->
  <rect width="1200" height="630" fill="#0b0f19" />
  
  <!-- Glow and gradients definitions -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#0b0f19" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="50%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="blurFilter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="55" result="blur" />
    </filter>
  </defs>

  <!-- Soft ambient centering glow -->
  <circle cx="600" cy="315" r="450" fill="url(#glow)" />
  
  <!-- Cybernetic technical background mesh rings -->
  <g opacity="0.08">
    <circle cx="600" cy="315" r="320" stroke="#06b6d4" stroke-width="1.5" fill="none" stroke-dasharray="6,6" />
    <circle cx="600" cy="315" r="240" stroke="#2563eb" stroke-width="2" fill="none" />
    <circle cx="600" cy="315" r="160" stroke="#3b82f6" stroke-width="1.5" fill="none" stroke-dasharray="12,6" />
    <line x1="150" y1="315" x2="1050" y2="315" stroke="#06b6d4" stroke-width="0.75" />
    <line x1="600" y1="65" x2="600" y2="565" stroke="#06b6d4" stroke-width="0.75" />
  </g>

  <!-- Glowing cloud vector aura (blur effect) -->
  <g filter="url(#blurFilter)" opacity="0.55">
    <path d="M 600 150 C 510 150, 480 220, 430 230 C 370 230, 310 280, 310 350 C 310 420, 370 470, 450 470 L 750 470 C 830 470, 890 420, 890 350 C 890 280, 830 230, 770 230 C 720 220, 690 150, 600 150 Z" fill="none" stroke="url(#cloudGrad)" stroke-width="75" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Premium sharp cloud vector contour (the brand logo shape with no text) -->
  <path d="M 600 150 C 510 150, 480 220, 430 230 C 370 230, 310 280, 310 350 C 310 420, 370 470, 450 470 L 750 470 C 830 470, 890 420, 890 350 C 890 280, 830 230, 770 230 C 720 220, 690 150, 600 150 Z" fill="none" stroke="url(#cloudGrad)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" />
</svg>
